<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>לחצות את מאדים</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Heebo',system-ui,sans-serif;user-select:none;-webkit-user-select:none;background:#0e0e16;color:#e0e0f0}
body{overflow-y:auto}
html.mode-game,html.mode-game body{overflow:hidden;position:fixed;width:100%;height:100%;height:100dvh;touch-action:none;overscroll-behavior:none}
a,button,input,textarea{-webkit-tap-highlight-color:transparent}

/* ═══ WELCOME ═══ */
#welcomeScreen{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:clamp(24px,6vmin,48px);background:#0b0b15}
.welcome-logo{font-size:clamp(56px,12vmin,90px);line-height:1;margin-bottom:8px}
#welcomeScreen h1{font-size:clamp(32px,6vmin,52px);margin-bottom:10px;color:#e8e4f8;font-weight:800;letter-spacing:-.5px}
#welcomeScreen .sub{font-size:clamp(14px,1.8vmin,17px);color:#6a6e84;margin-bottom:clamp(36px,6vmin,56px);max-width:440px;line-height:1.8}
.welcome-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
@media(min-width:600px){.welcome-btns{flex-direction:row;max-width:440px;gap:16px}}
.w-btn{padding:16px 24px;font-size:clamp(15px,1.8vmin,17px);border:none;border-radius:14px;cursor:pointer;font-weight:700;transition:transform .15s,box-shadow .2s;font-family:inherit;letter-spacing:.3px;width:100%;min-height:54px;display:flex;align-items:center;justify-content:center;gap:8px}
.w-btn:active{transform:scale(.96)}
.w-btn-play{background:rgba(255,255,255,.05);color:#9a9ab0;border:1px solid rgba(255,255,255,.08)}
.w-btn-play:hover{background:rgba(255,255,255,.09);transform:scale(1.02)}
.w-btn-edit{background:#7c3aed;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.25)}
.w-btn-edit:hover{background:#8b5cf6;box-shadow:0 6px 28px rgba(124,58,237,.4);transform:scale(1.02)}

/* ═══ EDITOR ═══ */
#editorScreen{min-height:100dvh;padding:0 clamp(16px,5vw,64px) clamp(32px,5vmin,56px);background:#0b0b15;display:none;max-width:800px;margin:0 auto;padding-top:68px}
.editor-topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px clamp(16px,5vw,64px);background:rgba(11,11,21,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04)}
.editor-topbar h2{font-size:clamp(15px,2.2vmin,19px);color:#e8e4f8;font-weight:700;margin:0;letter-spacing:.2px}
.editor-topbar-actions{display:flex;gap:10px}
.e-btn{padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border:none;border-radius:12px;cursor:pointer;font-weight:700;font-family:inherit;min-height:50px;transition:transform .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.e-btn:active{transform:scale(.96)}
.e-btn-start{background:#7c3aed;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.25);padding:8px 24px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-start:hover{background:#8b5cf6;transform:scale(1.02)}
.e-btn-back{background:rgba(255,255,255,.05);color:#7a7e94;border:1px solid rgba(255,255,255,.06);padding:8px 20px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-back:hover{background:rgba(255,255,255,.08)}
.editor-header{text-align:center;padding:clamp(16px,3vmin,28px) 0 clamp(8px,1.5vmin,12px)}
.editor-header p{font-size:clamp(13px,1.6vmin,15px);color:#6a6e84;letter-spacing:.3px}
.editor-section{margin-bottom:clamp(20px,3.5vmin,32px);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:clamp(20px,3vmin,30px)}
.editor-section h3{font-size:clamp(11px,1.3vmin,12px);color:#6e7090;margin-bottom:clamp(14px,2.5vmin,22px);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.asset-wrap{position:relative;width:100%;max-width:200px;margin:0 auto;border-radius:12px;overflow:hidden;aspect-ratio:1}
.asset-preview{width:100%;height:100%;object-fit:cover;background:#12121e;display:block;border:1px solid rgba(255,255,255,.05);border-radius:12px}
.asset-overlay{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.upload-btn{display:flex;align-items:center;justify-content:center;padding:0 14px;font-size:clamp(11px,1.3vmin,13px);border-radius:8px;cursor:pointer;font-family:inherit;height:32px;line-height:1;box-sizing:border-box;transition:all .2s;font-weight:500;text-align:center;flex:1;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#e8e8f0}
.upload-btn:hover{background:rgba(255,255,255,.25);color:#fff}
input[type="file"]{display:none}
.field-group{margin-bottom:22px}
.field-group:last-child{margin-bottom:0}
.field-label{display:block;font-size:clamp(12px,1.5vmin,14px);color:#9a9eb4;margin-bottom:10px;font-weight:500;letter-spacing:.2px}
.text-field{width:100%;padding:14px 18px;font-size:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:#d0d4e4;font-family:inherit;min-height:48px;resize:vertical;transition:border-color .2s,box-shadow .2s;line-height:1.5}
.text-field:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);background:rgba(255,255,255,.045)}
.diff-group{display:flex;gap:10px}
.diff-btn{flex:1;padding:12px 8px;font-size:clamp(13px,1.5vmin,15px);border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#7a7e94;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;min-height:48px;display:flex;align-items:center;justify-content:center}
.diff-btn:hover{background:rgba(255,255,255,.07)}
.diff-btn.active{border-color:#7c3aed;background:rgba(124,58,237,.1);color:#c4b5fd}
.e-btn-share-full{width:100%;background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.18);padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border-radius:12px;cursor:pointer;font-weight:600;font-family:inherit;min-height:50px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.e-btn-share-full:hover{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.3)}
.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;color:#e8e4f8;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;border:1px solid rgba(124,58,237,.2);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ GAME SCREEN ═══ */
#gameScreen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;width:100%;height:100%;height:100dvh;overflow:hidden}
.back-to-editor{position:fixed;top:8px;left:8px;top:calc(8px + env(safe-area-inset-top,0px));left:calc(8px + env(safe-area-inset-left,0px));z-index:150;padding:8px 14px;font-size:clamp(11px,1.6vmin,14px);border:none;border-radius:8px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);min-height:36px;transition:background .2s;box-shadow:none;letter-spacing:0}
.back-to-editor:hover{background:rgba(0,0,0,.7);color:#fff}

/* ═══ GAME INTERNALS (unchanged) ═══ */
html.mode-game,html.mode-game body{background:#0a0508}
#game-container{position:absolute;top:0;left:0;right:0;bottom:0;background:#0a0508;touch-action:none;overflow:hidden}
#game-container canvas{display:block;position:absolute;top:0;left:0}
#ui-layer{position:absolute;top:0;right:0;left:0;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px));padding-left:calc(14px + env(safe-area-inset-left,0px));padding-right:calc(14px + env(safe-area-inset-right,0px));pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;z-index:20}
.stat-card{background:rgba(20,10,15,0.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:6px 14px;border-radius:10px;border:1px solid rgba(200,100,60,0.08);display:flex;flex-direction:column;align-items:center;min-width:56px}
.label{font-size:9px;color:rgba(220,160,130,0.3);letter-spacing:3px;font-weight:300}
.value{font-size:19px;font-weight:700;color:#e0935a}
#lives-val{color:#d04040;font-size:16px}
#time-val{color:#e8a84a}
#speedometer{position:absolute;bottom:90px;bottom:calc(90px + env(safe-area-inset-bottom,0px));right:12px;right:calc(12px + env(safe-area-inset-right,0px));width:5px;height:80px;background:rgba(30,15,20,0.5);border-radius:3px;overflow:hidden;display:flex;flex-direction:column-reverse;z-index:20}
#speed-bar{width:100%;height:20%;background:#d07030;transition:height 0.15s ease;border-radius:2px}
#overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,rgba(30,10,22,0.95) 0%,rgba(8,3,6,0.98) 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;padding:20px;padding-top:calc(20px + env(safe-area-inset-top,0px));padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));transition:opacity 0.6s ease;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
#overlay.hidden{opacity:0;pointer-events:none}
#game-container h1{font-size:clamp(28px,7vmin,40px);font-weight:900;margin:0 0 8px;letter-spacing:3px;color:#e8a060;text-shadow:0 0 40px rgba(230,130,50,0.3),0 0 80px rgba(200,80,30,0.12),0 3px 10px rgba(0,0,0,0.5)}
.subtitle{font-size:13px;color:rgba(200,160,140,0.2);margin-bottom:44px;font-weight:300;letter-spacing:8px}
.score-summary{font-size:19px;margin:16px 0 36px;color:rgba(230,200,180,0.55);font-weight:400;letter-spacing:1px}
.score-summary span{font-weight:300}
#game-container button{background:linear-gradient(145deg,#7a2545,#a83860,#7a2545);border:1px solid rgba(255,120,80,0.15);color:#ffe8dc;padding:16px clamp(40px,10vw,64px);font-size:clamp(16px,3vmin,19px);border-radius:50px;cursor:pointer;font-weight:500;font-family:inherit;transition:transform 0.15s,background 0.25s,box-shadow 0.25s;letter-spacing:3px;box-shadow:0 6px 30px rgba(160,40,60,0.35),0 0 60px rgba(200,60,40,0.1),inset 0 1px 0 rgba(255,200,180,0.1)}
#game-container button:hover{background:linear-gradient(145deg,#903060,#c04878,#903060);transform:translateY(-2px) scale(1.03);box-shadow:0 10px 40px rgba(180,50,70,0.45),0 0 80px rgba(220,70,50,0.15),inset 0 1px 0 rgba(255,200,180,0.12)}
#game-container button:active{transform:translateY(1px) scale(0.98);box-shadow:0 3px 15px rgba(120,30,50,0.3)}
#level-up-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);font-size:44px;font-weight:900;color:#e0935a;opacity:0;pointer-events:none;z-index:50;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);text-shadow:0 0 30px rgba(220,120,50,0.5)}
#level-up-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#damage-flash{position:absolute;inset:0;border:4px solid rgba(220,60,40,0.6);border-radius:6px;opacity:0;pointer-events:none;z-index:30;transition:opacity 0.08s}
#damage-flash.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_ASTRO='https://static.wixstatic.com/media/b4f4e1_f87d1ce915534c9380876c85ea86a688~mv2.jpg';
const GAME_DURATION=60;

const STATE={
    mode:'welcome',
    difficulty:'medium',
    assets:{astronaut:DEFAULT_ASTRO},
    texts:{title:'לחצות את מאדים',subtitle:'מסע בין הכוכבים',endTime:'המשימה הושלמה!',endDeath:'התנגשות!'}
};

const DIFF_CFG={
    easy:{spd:1.8,freq:80,meteor:0.2,alien:0.15},
    medium:{spd:2.4,freq:55,meteor:0.25,alien:0.3},
    hard:{spd:3.2,freq:35,meteor:0.3,alien:0.4}
};

function loadFromHash(){
    const h=location.hash;if(!h||!h.startsWith('#g='))return false;
    try{
        const json=JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
        if(json.d)STATE.difficulty=json.d;
        if(json.t)Object.assign(STATE.texts,json.t);
        if(json.a&&json.a.astronaut)STATE.assets.astronaut=json.a.astronaut;
        STATE.mode='game';return true;
    }catch(e){return false}
}

function shareGame(){
    const shareData={d:STATE.difficulty,t:STATE.texts};
    if(STATE.assets.astronaut!==DEFAULT_ASTRO)shareData.a={astronaut:STATE.assets.astronaut};
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));
    const url=window.location.href.split('#')[0]+'#g='+encoded;
    if(navigator.clipboard&&window.isSecureContext){
        navigator.clipboard.writeText(url).then(()=>showToast('הלינק הועתק!')).catch(()=>fallbackCopy(url));
    }else fallbackCopy(url);
}

function fallbackCopy(url){
    const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;top:-9999px;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');showToast('הלינק הועתק!')}catch(e){showToast('לא הצלחנו להעתיק')}
    ta.remove();
}

function showToast(msg){
    let t=document.querySelector('.share-toast');
    if(!t){t=document.createElement('div');t.className='share-toast';document.body.appendChild(t)}
    t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

function handleUpload(e,cb){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>cb(ev.target.result);r.readAsDataURL(f);}

function renderApp(){
    const app=document.getElementById('app');
    document.documentElement.classList.remove('mode-game');
    if(STATE.mode==='welcome'){app.innerHTML=renderWelcome();bindWelcome();}
    else if(STATE.mode==='editor'){app.innerHTML=renderEditor();bindEditor();}
    else if(STATE.mode==='game'){document.documentElement.classList.add('mode-game');app.innerHTML=renderGame();setTimeout(bindGame,50);}
}

function renderWelcome(){
    return `<div id="welcomeScreen"><div class="welcome-logo">🚀</div><h1>לחצות את מאדים</h1><p class="sub">טוסו בין המטאורים, אספו כוכבים והימנעו מחייזרים</p><div class="welcome-btns"><button class="w-btn w-btn-edit" id="wEditBtn">ערוך משחק</button><button class="w-btn w-btn-play" id="wPlayBtn">שחק עכשיו</button></div></div>`;
}

function bindWelcome(){
    document.getElementById('wPlayBtn').onclick=()=>{STATE.mode='game';renderApp()};
    document.getElementById('wEditBtn').onclick=()=>{STATE.mode='editor';renderApp()};
}

function renderEditor(){
    const src=STATE.assets.astronaut;
    return `<div id="editorScreen" style="display:block">
<div class="editor-topbar"><h2>עורך המשחק</h2><div class="editor-topbar-actions"><button class="e-btn e-btn-back" id="edBackBtn">חזרה</button><button class="e-btn e-btn-start" id="edStartBtn">התחל משחק</button></div></div>
<div class="editor-header"><p>התאם את המשחק שלך</p></div>
<div class="editor-section"><h3>תמונת דמות</h3><div class="asset-wrap"><img class="asset-preview" src="${src}" id="astroPreview"/><div class="asset-overlay"><label class="upload-btn" for="astroFile">החלף תמונה</label></div></div><input type="file" id="astroFile" accept="image/*"/></div>
<div class="editor-section"><h3>טקסטים</h3><div class="field-group"><label class="field-label">כותרת פתיחה</label><input class="text-field" id="txtTitle" value="${STATE.texts.title}"/></div><div class="field-group"><label class="field-label">כותרת משנה</label><input class="text-field" id="txtSub" value="${STATE.texts.subtitle}"/></div><div class="field-group"><label class="field-label">הודעת סיום זמן</label><input class="text-field" id="txtEnd" value="${STATE.texts.endTime}"/></div><div class="field-group"><label class="field-label">הודעת מוות</label><input class="text-field" id="txtDeath" value="${STATE.texts.endDeath}"/></div></div>
<div class="editor-section"><h3>רמת קושי</h3><div class="diff-group"><button class="diff-btn ${STATE.difficulty==='easy'?'active':''}" data-diff="easy">קל</button><button class="diff-btn ${STATE.difficulty==='medium'?'active':''}" data-diff="medium">בינוני</button><button class="diff-btn ${STATE.difficulty==='hard'?'active':''}" data-diff="hard">קשה</button></div></div>
<div class="editor-section"><button class="e-btn-share-full" id="edShareBtn">שתף משחק</button></div>
</div>`;
}

function saveTexts(){
    const t=id=>document.getElementById(id);
    if(t('txtTitle'))STATE.texts.title=t('txtTitle').value;
    if(t('txtSub'))STATE.texts.subtitle=t('txtSub').value;
    if(t('txtEnd'))STATE.texts.endTime=t('txtEnd').value;
    if(t('txtDeath'))STATE.texts.endDeath=t('txtDeath').value;
}

function bindEditor(){
    document.getElementById('astroFile').onchange=e=>handleUpload(e,url=>{STATE.assets.astronaut=url;document.getElementById('astroPreview').src=url;});
    document.querySelectorAll('.diff-btn').forEach(b=>b.onclick=()=>{saveTexts();STATE.difficulty=b.dataset.diff;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.toggle('active',x.dataset.diff===STATE.difficulty));});
    document.getElementById('edBackBtn').onclick=()=>{saveTexts();STATE.mode='welcome';renderApp()};
    document.getElementById('edStartBtn').onclick=()=>{saveTexts();STATE.mode='game';renderApp()};
    document.getElementById('edShareBtn').onclick=()=>{saveTexts();shareGame()};
}

function renderGame(){
    return `<div id="gameScreen" style="display:block"><button class="back-to-editor" id="backBtn">← עריכה</button>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="level-up-toast"></div>
    <div id="damage-flash"></div>
    <div id="ui-layer">
        <div class="stat-card"><span class="label">זמן</span><span class="value" id="time-val">${GAME_DURATION}</span></div>
        <div class="stat-card"><span class="label">מרחק</span><span class="value" id="score-val">0</span></div>
        <div class="stat-card"><span class="label">חיים</span><span class="value" id="lives-val">❤️❤️❤️</span></div>
    </div>
    <div id="speedometer"><div id="speed-bar"></div></div>
    <div id="overlay">
        <h1 id="title">${STATE.texts.title}</h1>
        <div class="subtitle">${STATE.texts.subtitle}</div>
        <p id="summary" class="score-summary"></p>
        <button id="start-btn">שחק שוב</button>
    </div>
</div></div>`;
}

function bindGame(){
    document.getElementById('backBtn').addEventListener('click',()=>{STATE.mode='editor';renderApp()});
    initGameEngine();
}

/* ═══════════════════════════════════════════════════
   GAME ENGINE — all original logic preserved below
   ═══════════════════════════════════════════════════ */
let gameEngineRunning=false,animFrameId=null;

function initGameEngine(){
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}

    const canvas=document.getElementById('gameCanvas');
    const ctx=canvas.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    let cW=600,cH=900;
    ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
    const scoreVal=document.getElementById('score-val');
    const timeVal=document.getElementById('time-val');
    const livesVal=document.getElementById('lives-val');
    const speedBar=document.getElementById('speed-bar');
    const overlay=document.getElementById('overlay');
    const startBtn=document.getElementById('start-btn');
    const levelToast=document.getElementById('level-up-toast');
    const damageFlash=document.getElementById('damage-flash');

    const astroImg=new Image();
    astroImg.crossOrigin='anonymous';
    astroImg.src=STATE.assets.astronaut;
    const alienEmojis=['👽','👾','🛸','🤖','👹','💀'];
    let lastAlienEmoji='';
    function pickAlienEmoji(){let e;do{e=alienEmojis[Math.floor(Math.random()*alienEmojis.length)];}while(e===lastAlienEmoji&&alienEmojis.length>1);lastAlienEmoji=e;return e;}

    let noiseCanvas,starCanvas,nebulaCanvas;

    function createNoiseTexture(w,h,alpha){const c=document.createElement('canvas');c.width=w;c.height=h;const cx=c.getContext('2d');const img=cx.createImageData(w,h);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255;img.data[i]=v;img.data[i+1]=v;img.data[i+2]=v;img.data[i+3]=alpha*255;}cx.putImageData(img,0,0);return c;}

    function createStarTexture(w,h){

    function update(){
        if(!gameActive)return;frameCount++;
        if(frameCount%60===0){gameTime--;timeVal.innerText=gameTime;if(gameTime<=0){gameOver(STATE.texts.endTime);return;}}
        if(gameTime<=10&&frameCount%60===0)timeVal.style.color='#e04040';
        const scrollSpd=baseSpeed*speedBoost;corridorPts.forEach(p=>p.y+=scrollSpd);
        if(corridorPts[0].y>cH+10){corridorPts.shift();const last=corridorPts[corridorPts.length-1];let nx=last.x+(Math.random()-0.5)*13;const lim=corridorW/2+Math.min(80,(cW-corridorW)*0.3);nx=Math.max(lim,Math.min(cW-lim,nx));corridorPts.push({x:nx,y:last.y-5,jL:(Math.random()-0.5)*12,jR:(Math.random()-0.5)*12});score++;scoreVal.innerText=Math.floor(score/10);
        if(frameCount%cfg.freq===0){const rand=Math.random();if(rand<cfg.meteor){items.push({type:'meteor',x:nx+(Math.random()-0.5)*(corridorW-60),y:last.y,size:20+Math.random()*20,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.02,pts:Array.from({length:8},()=>0.7+Math.random()*0.5),cracks:Array.from({length:2+Math.floor(Math.random()*3)},()=>({a:Math.random()*Math.PI*2,len:0.3+Math.random()*0.5}))});}else if(rand<cfg.meteor+cfg.alien){enemies.push({type:'alien',x:nx+(Math.random()-0.5)*(corridorW*0.5),y:last.y,vx:(Math.random()-0.5)*1.2,emoji:pickAlienEmoji()});}else{const pr=Math.random();if(pr<0.3)items.push({type:'life',x:nx+(Math.random()-0.5)*(corridorW-50),y:last.y,phase:Math.random()*Math.PI*2});else if(pr<0.55)items.push({type:'turbo',x:nx+(Math.random()-0.5)*(corridorW-50),y:last.y,phase:Math.random()*Math.PI*2});else items.push({type:'star',x:nx+(Math.random()-0.5)*(corridorW-50),y:last.y,phase:Math.random()*Math.PI*2});}}
        if(score%15===0){for(let side=-1;side<=1;side+=2){if(Math.random()<0.4){const bx=Math.max(40,Math.min(cW-40,last.x+side*(corridorW/2+22+Math.random()*50)));const tooClose=corridorDecor.some(d=>Math.abs(d.x-bx)<60&&Math.abs(d.y-last.y)<80);if(!tooClose)corridorDecor.push({x:bx,y:last.y,type:decorTypes[Math.floor(Math.random()*decorTypes.length)],scale:1+Math.random()*0.6});}}}}
        for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy+scrollSpd*0.3;p.vx*=0.96;p.vy*=0.96;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
        if(frameCount%3===0)particles.push({x:ship.x+(Math.random()-0.5)*18,y:ship.y+68,vx:(Math.random()-0.5)*1,vy:1.5+Math.random()*2.5,life:1,decay:0.035,size:2+Math.random()*3,color:speedBoost>1.3?'rgba(255,140,50,0.4)':'rgba(200,80,30,0.25)'});
        for(let i=corridorDecor.length-1;i>=0;i--){corridorDecor[i].y+=scrollSpd;if(corridorDecor[i].y>cH+100)corridorDecor.splice(i,1);}
        for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.y+=scrollSpd;e.x+=e.vx;if(dist(ship.x,ship.y,e.x,e.y)<55){hit(STATE.texts.endDeath);createExplosion(e.x,e.y,'#8020a0');playExplosion();enemies.splice(i,1);continue;}if(e.y>cH+100)enemies.splice(i,1);}
        for(let i=items.length-1;i>=0;i--){const it=items[i];if(it.phase!==undefined)it.phase+=0.05;if(it.rot!==undefined)it.rot+=it.rotSpd;it.y+=scrollSpd;const cd=it.type==='meteor'?it.size*1.1:45;if(dist(ship.x,ship.y,it.x,it.y)<cd){if(it.type==='meteor'){hit('התנגשות במטאור!');createExplosion(it.x,it.y,'#a03020',12);}else if(it.type==='life'){lives=Math.min(5,lives+1);updateUIFn();createExplosion(it.x,it.y,'#d04040',10);playPickup();spawnPopup(it.x,it.y,'❤️','חיים +1','#d04040');}else if(it.type==='turbo'){shieldTimer=600;createExplosion(it.x,it.y,'#40a0e0',10);playPickup();playTone(800,0.1);spawnPopup(it.x,it.y,'⚡','מגן!','#40a0e0');}else if(it.type==='star'){score+=50;scoreVal.innerText=Math.floor(score/10);createExplosion(it.x,it.y,'#e8c040',8);playPickup();playTone(1000,0.08);spawnPopup(it.x,it.y,'⭐','+5','#e8c040');}items.splice(i,1);continue;}if(it.y>cH+100)items.splice(i,1);}
        for(let i=popups.length-1;i>=0;i--){const pp=popups[i];pp.age++;pp.y-=1.2;pp.life-=0.015;if(pp.life<=0)popups.splice(i,1);}
        speedBar.style.height=(speedBoost/2.5)*100+'%';tickTouchHold();handleInput();checkBounds();ship.bobPhase+=0.055;ship.angle+=(ship.targetAngle-ship.angle)*0.12;if(invuln>0)invuln--;if(shake>0)shake*=0.87;if(speedBoostTimer>0)speedBoostTimer--;if(shieldTimer>0)shieldTimer--;
    }

    function draw(){
        ctx.setTransform(dpr,0,0,dpr,0,0);ctx.save();if(shake>0.5)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
        const sp=ctx.createPattern(starCanvas,'repeat');ctx.fillStyle=sp;ctx.save();ctx.translate(0,(score*baseSpeed*0.15)%640);ctx.fillRect(0,-640,cW,cH+640);ctx.restore();
        const np=ctx.createPattern(nebulaCanvas,'repeat');ctx.save();ctx.globalAlpha=0.5;ctx.fillStyle=np;ctx.translate((frameCount*0.03)%384,(frameCount*0.06+score*0.1)%384);ctx.fillRect(-384,-384,cW+384,cH+384);ctx.restore();
        ctx.fillStyle='rgba(10,5,8,0.2)';ctx.fillRect(0,0,cW,cH);
        ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.moveTo(0,corridorPts[0].y);corridorPts.forEach(p=>ctx.lineTo(p.x-corridorW/2-8+(p.jL||0),p.y));ctx.lineTo(0,corridorPts[corridorPts.length-1].y);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(cW,corridorPts[0].y);corridorPts.forEach(p=>ctx.lineTo(p.x+corridorW/2+8+(p.jR||0),p.y));ctx.lineTo(cW,corridorPts[corridorPts.length-1].y);ctx.closePath();ctx.fill();
        const wL=ctx.createLinearGradient(0,0,cW*0.3,0);wL.addColorStop(0,'#1a1018');wL.addColorStop(0.5,'#22142a');wL.addColorStop(1,'#2e1c38');ctx.fillStyle=wL;ctx.beginPath();ctx.moveTo(0,corridorPts[0].y);corridorPts.forEach(p=>ctx.lineTo(p.x-corridorW/2-3+(p.jL||0),p.y));ctx.lineTo(0,corridorPts[corridorPts.length-1].y);ctx.closePath();ctx.fill();
        const wR=ctx.createLinearGradient(cW*0.7,0,cW,0);wR.addColorStop(0,'#2e1c38');wR.addColorStop(0.5,'#22142a');wR.addColorStop(1,'#1a1018');ctx.fillStyle=wR;ctx.beginPath();ctx.moveTo(cW,corridorPts[0].y);corridorPts.forEach(p=>ctx.lineTo(p.x+corridorW/2+3+(p.jR||0),p.y));ctx.lineTo(cW,corridorPts[corridorPts.length-1].y);ctx.closePath();ctx.fill();
        ctx.lineWidth=1.5;ctx.strokeStyle='rgba(200,80,50,0.14)';ctx.beginPath();corridorPts.forEach((p,i)=>{const ex=p.x-corridorW/2+(p.jL||0);i===0?ctx.moveTo(ex,p.y):ctx.lineTo(ex,p.y);});ctx.stroke();ctx.beginPath();corridorPts.forEach((p,i)=>{const ex=p.x+corridorW/2+(p.jR||0);i===0?ctx.moveTo(ex,p.y):ctx.lineTo(ex,p.y);});ctx.stroke();
        corridorDecor.forEach(drawDecor);items.forEach(drawItem);enemies.forEach(drawEnemy);
        if(invuln>0&&Math.floor(invuln/4)%2===0)ctx.globalAlpha=0.4;drawShip(ctx,ship.x,ship.y+Math.sin(ship.bobPhase)*2,ship.angle);ctx.globalAlpha=1;
        particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
        popups.forEach(pp=>{const t=pp.age/80,sc=t<0.15?t/0.15:1,bounce=t<0.2?1+Math.sin(t/0.2*Math.PI)*0.3:1,fs=Math.min(sc*bounce,1.2);ctx.save();ctx.translate(pp.x,pp.y);ctx.scale(fs,fs);ctx.globalAlpha=pp.life;ctx.font='30px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pp.icon,0,-4);ctx.font='500 15px Heebo';ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText(pp.text,1,22);ctx.fillStyle=pp.color;ctx.fillText(pp.text,0,21);ctx.globalAlpha=1;ctx.restore();});
        if(shieldTimer>0){ctx.save();ctx.translate(ship.x,ship.y+Math.sin(ship.bobPhase)*2);const pulse=0.18+Math.sin(frameCount*0.08)*0.06;const r=90;ctx.shadowColor=`rgba(60,160,255,${pulse+0.1})`;ctx.shadowBlur=30;const sg=ctx.createRadialGradient(0,0,r*0.7,0,0,r);sg.addColorStop(0,'rgba(60,160,255,0)');sg.addColorStop(0.75,`rgba(80,180,255,${pulse*0.3})`);sg.addColorStop(1,`rgba(100,200,255,${pulse})`);ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(120,200,255,${pulse+0.12})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();if(shieldTimer<180){const blink=Math.floor(shieldTimer/8)%2;if(blink)ctx.globalAlpha=0.4;}ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.restore();}
        ctx.globalAlpha=0.03;ctx.drawImage(noiseCanvas,(frameCount*7)%128,(frameCount*11)%128,256,256,0,0,cW,cH);ctx.globalAlpha=1;ctx.restore();
    }

    function drawDecor(d){ctx.save();ctx.translate(d.x,d.y);const sc=d.scale||1;ctx.scale(sc,sc);const shR=d.type.includes('rock')?14:6;ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(2,3,shR,shR*0.35,0.1,0,Math.PI*2);ctx.fill();if(d.type==='rock_sm'||d.type==='rock_md'){const sz=d.type==='rock_sm'?9:14;ctx.fillStyle='#2a2030';ctx.beginPath();ctx.moveTo(-sz*0.8,sz*0.4);ctx.lineTo(-sz*0.6,-sz*0.4);ctx.lineTo(sz*0.1,-sz*0.8);ctx.lineTo(sz*0.9,-sz*0.4);ctx.lineTo(sz*1.1,sz*0.5);ctx.closePath();ctx.fill();ctx.fillStyle='#3a3045';ctx.beginPath();ctx.moveTo(-sz*0.9,sz*0.3);ctx.lineTo(-sz*0.7,-sz*0.5);ctx.lineTo(0,-sz*0.9);ctx.lineTo(sz*0.8,-sz*0.5);ctx.lineTo(sz*1,sz*0.4);ctx.closePath();ctx.fill();}else{ctx.fillStyle='#201820';ctx.beginPath();ctx.moveTo(-7,3);ctx.lineTo(-5,-3);ctx.lineTo(0,-7);ctx.lineTo(7,-3);ctx.lineTo(9,3);ctx.closePath();ctx.fill();}ctx.restore();}

    function drawItem(it){ctx.save();ctx.translate(it.x,it.y);const bob=it.phase!==undefined?Math.sin(it.phase)*2.5:0;if(it.type==='meteor'){if(it.rot)ctx.rotate(it.rot);ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=14;ctx.shadowOffsetY=4;ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(4,5,it.size*0.8,it.size*0.38,0.08,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;ctx.fillStyle='#3a2830';ctx.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j]+1.5;j===0?ctx.moveTo(Math.cos(a)*r+2,Math.sin(a)*r+2):ctx.lineTo(Math.cos(a)*r+2,Math.sin(a)*r+2);}ctx.closePath();ctx.fill();ctx.save();ctx.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j];j===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();const mg=ctx.createRadialGradient(-it.size*0.25,-it.size*0.25,0,0,0,it.size);mg.addColorStop(0,'#7a6068');mg.addColorStop(0.4,'#5a4450');mg.addColorStop(0.8,'#3a2838');mg.addColorStop(1,'#2a1828');ctx.fillStyle=mg;ctx.fill();ctx.restore();ctx.fillStyle='rgba(220,180,170,0.08)';ctx.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j]*0.45;j===0?ctx.moveTo(Math.cos(a)*r-3,Math.sin(a)*r-3):ctx.lineTo(Math.cos(a)*r-3,Math.sin(a)*r-3);}ctx.closePath();ctx.fill();if(it.cracks){ctx.strokeStyle='rgba(0,0,0,0.14)';ctx.lineWidth=0.7;it.cracks.forEach(cr=>{ctx.beginPath();ctx.moveTo(0,0);const ex=Math.cos(cr.a)*it.size*cr.len,ey=Math.sin(cr.a)*it.size*cr.len;ctx.quadraticCurveTo(ex*0.3+3,ey*0.3-2,ex,ey);ctx.stroke();});}}else if(it.type==='life'){ctx.shadowColor='rgba(220,40,40,0.35)';ctx.shadowBlur=22;ctx.globalAlpha=0.12;ctx.fillStyle='#d04040';ctx.beginPath();ctx.arc(0,bob,30,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.font='44px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('❤️',0,bob);ctx.shadowColor='transparent';ctx.shadowBlur=0;}else if(it.type==='turbo'){const pulse=Math.sin(frameCount*0.1)*2;ctx.shadowColor='rgba(240,160,30,0.4)';ctx.shadowBlur=24;ctx.globalAlpha=0.14;ctx.fillStyle='#e09030';ctx.beginPath();ctx.arc(0,bob,30+pulse,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.font='42px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',0,bob);ctx.shadowColor='transparent';ctx.shadowBlur=0;}else if(it.type==='star'){const pulse=Math.sin(frameCount*0.12)*2;const rot=frameCount*0.02;ctx.save();ctx.translate(0,bob);ctx.rotate(rot);ctx.shadowColor='rgba(230,190,50,0.45)';ctx.shadowBlur=26;ctx.globalAlpha=0.12;ctx.fillStyle='#e8c040';ctx.beginPath();ctx.arc(0,0,28+pulse,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.font='40px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⭐',0,2);ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.restore();}ctx.restore();}

    function drawEnemy(e){ctx.save();ctx.translate(e.x,e.y);const bob=Math.sin(frameCount*0.06+(e.x*0.01))*3;const pulse=0.95+Math.sin(frameCount*0.08)*0.05;ctx.shadowColor='rgba(150,30,200,0.35)';ctx.shadowBlur=28;ctx.shadowOffsetY=4;ctx.fillStyle='rgba(120,20,180,0.08)';ctx.beginPath();ctx.arc(0,bob,38,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;const glow=ctx.createRadialGradient(0,bob,8,0,bob,42);glow.addColorStop(0,'rgba(180,60,255,0.12)');glow.addColorStop(0.6,'rgba(120,20,200,0.04)');glow.addColorStop(1,'transparent');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,bob,42,0,Math.PI*2);ctx.fill();ctx.save();ctx.translate(0,bob);ctx.scale(pulse,pulse);ctx.font='52px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.emoji||'👽',0,4);ctx.restore();ctx.restore();}

    function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
    function nearestPt(y){const idx=Math.round((corridorPts[0].y-y)/5);if(idx>=0&&idx<corridorPts.length)return corridorPts[idx];for(let i=0;i<corridorPts.length;i++){if(Math.abs(corridorPts[i].y-y)<10)return corridorPts[i];}return null;}
    function hit(reason){if(invuln>0||shieldTimer>0)return;lives--;invuln=100;shake=14;playCollision();updateUIFn();damageFlash.classList.add('show');setTimeout(()=>damageFlash.classList.remove('show'),180);if(lives<=0)gameOver(reason);}
    function checkBounds(){const p=nearestPt(ship.y);if(p){if(ship.x<p.x-corridorW/2+35||ship.x>p.x+corridorW/2-35){hit('פגיעה בקיר אנרגיה!');createDust(ship.x,ship.y);ship.x=p.x;}}}
    function updateUIFn(){livesVal.innerText='❤️'.repeat(lives);}
    function gameOver(msg){gameActive=false;const fs=Math.floor(score/10);if(fs>highScore){highScore=fs;localStorage.setItem('spaceHS',highScore.toString());}document.getElementById('title').innerText=msg;const survived=GAME_DURATION-Math.max(gameTime,0);document.getElementById('summary').innerHTML=`מרחק: ${fs} · שרדת: ${survived} שניות<br><span style="font-size:13px;opacity:0.4">שיא: ${highScore}</span>`;overlay.classList.remove('hidden');timeVal.style.color='#e8a84a';}

    const keys={};
    window.onkeydown=e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();};
    window.onkeyup=e=>keys[e.code]=false;
    let touchHoldLeft=0,touchHoldRight=0,touchHoldUp=0,touchHoldDown=0;
    let touchLeft=false,touchRight=false,touchSpeedUp=false,touchSpeedDown=false;
    const TOUCH_PERSIST=8;
    function updateTouches(touches){let rL=false,rR=false,rU=false,rD=false;const rect=canvas.getBoundingClientRect();for(let i=0;i<touches.length;i++){const rx=(touches[i].clientX-rect.left)/rect.width,ry=(touches[i].clientY-rect.top)/rect.height;if(rx<0.42)rL=true;if(rx>0.58)rR=true;if(ry<0.48)rU=true;if(ry>0.52)rD=true;}if(rL)touchHoldLeft=TOUCH_PERSIST;if(rR)touchHoldRight=TOUCH_PERSIST;if(rU)touchHoldUp=TOUCH_PERSIST;if(rD)touchHoldDown=TOUCH_PERSIST;touchLeft=rL||touchHoldLeft>0;touchRight=rR||touchHoldRight>0;touchSpeedUp=rU||touchHoldUp>0;touchSpeedDown=rD||touchHoldDown>0;}
    function tickTouchHold(){if(touchHoldLeft>0)touchHoldLeft--;if(touchHoldRight>0)touchHoldRight--;if(touchHoldUp>0)touchHoldUp--;if(touchHoldDown>0)touchHoldDown--;touchLeft=touchHoldLeft>0;touchRight=touchHoldRight>0;touchSpeedUp=touchHoldUp>0;touchSpeedDown=touchHoldDown>0;}
    canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length>0)updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchcancel',e=>{e.preventDefault();touchHoldLeft=0;touchHoldRight=0;touchHoldUp=0;touchHoldDown=0;touchLeft=false;touchRight=false;touchSpeedUp=false;touchSpeedDown=false;},{passive:false});

    function handleInput(){let ml=keys['ArrowLeft']||keys['KeyA'],mr=keys['ArrowRight']||keys['KeyD'],mu=keys['ArrowUp']||keys['KeyW'],md=keys['ArrowDown']||keys['KeyS'];if(touchLeft)ml=true;if(touchRight)mr=true;if(touchSpeedUp)mu=true;if(touchSpeedDown)md=true;if(ml){ship.x-=4.5;ship.targetAngle=-0.22;}else if(mr){ship.x+=4.5;ship.targetAngle=0.22;}else ship.targetAngle=0;const spdStep=(touchSpeedUp||touchSpeedDown)?0.12:0.05;if(speedBoostTimer>0)speedBoost=2.5;else if(mu)speedBoost=Math.min(2.5,speedBoost+spdStep);else if(md)speedBoost=Math.max(0.5,speedBoost-spdStep);else speedBoost+=(1-speedBoost)*0.05;ship.x=Math.max(55,Math.min(cW-55,ship.x));}

    function loop(){update();draw();animFrameId=requestAnimationFrame(loop);}

    startBtn.onclick=()=>{
        initAudio();score=0;lives=3;baseSpeed=cfg.spd;corridorW=Math.max(280,Math.min(cW*cfg.widthRatio,520));invuln=0;frameCount=0;speedBoostTimer=0;shieldTimer=0;gameTime=GAME_DURATION;
        initCorridor();updateUIFn();timeVal.innerText=GAME_DURATION;timeVal.style.color='#e8a84a';scoreVal.innerText='0';
        overlay.classList.add('hidden');gameActive=true;
        for(let k=0;k<3;k++){const iy=ship.y-200-k*160;const rp=nearestPt(iy);if(!rp)continue;const rx=rp.x;if(k===0)items.push({type:'life',x:rx+(Math.random()-0.5)*(corridorW-60),y:iy,phase:Math.random()*Math.PI*2});else if(k===1)enemies.push({type:'alien',x:rx+(Math.random()-0.5)*(corridorW*0.5),y:iy,vx:(Math.random()-0.5)*1.2,emoji:pickAlienEmoji()});else items.push({type:'meteor',x:rx+(Math.random()-0.5)*(corridorW-50),y:iy,size:28,rot:0,rotSpd:0.01,pts:Array.from({length:8},()=>0.7+Math.random()*0.5),cracks:Array.from({length:3},()=>({a:Math.random()*Math.PI*2,len:0.4}))});}
    };

    window.onresize=resize;
    if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
    generateTextures();resize();loop();
}

loadFromHash();
renderApp();
</script>
