*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Heebo',system-ui,sans-serif;user-select:none;-webkit-user-select:none;background:#0e0e16;color:#e0e0f0}
body{overflow-y:auto}
html.mode-game,html.mode-game body{overflow:hidden;position:fixed;width:100%;height:100%;height:100dvh;touch-action:none;overscroll-behavior:none}
a,button,input,textarea{-webkit-tap-highlight-color:transparent}

/* ═══ WELCOME ═══ */
#welcomeScreen{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:clamp(24px,6vmin,48px);background:#000}
.welcome-logo{width:clamp(216px,55vmin,408px);max-height:48dvh;height:auto;object-fit:contain;display:block;margin:0 auto 14px;pointer-events:none;user-select:none;-webkit-user-drag:none;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges}
#welcomeScreen h1{font-size:clamp(32px,6vmin,52px);margin-bottom:10px;color:#e8e4f8;font-weight:800;letter-spacing:-.5px}
#welcomeScreen .sub{font-size:clamp(14px,1.8vmin,17px);color:#6a6e84;margin-bottom:clamp(36px,6vmin,56px);max-width:440px;line-height:1.8}
.welcome-btns{display:flex;flex-direction:row;gap:14px;width:100%;max-width:440px}
@media(min-width:600px){.welcome-btns{gap:16px}}
.w-btn{padding:16px 24px;font-size:clamp(15px,1.8vmin,17px);border:none;border-radius:14px;cursor:pointer;font-weight:700;transition:transform .15s,box-shadow .2s;font-family:inherit;letter-spacing:.3px;width:100%;min-height:54px;display:flex;align-items:center;justify-content:center;gap:8px}
.w-btn:active{transform:scale(.96)}
.w-btn-primary{background:#7c3aed;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.25)}
.w-btn-primary:hover{background:#8b5cf6;box-shadow:0 6px 28px rgba(124,58,237,.4);transform:scale(1.02)}
.w-btn-secondary{background:rgba(255,255,255,.05);color:#9a9ab0;border:1px solid rgba(255,255,255,.08)}
.w-btn-secondary:hover{background:rgba(255,255,255,.09);transform:scale(1.02)}

/* ═══ EDITOR ═══ */
#editorScreen{min-height:100dvh;padding:0 clamp(16px,5vw,64px) clamp(32px,5vmin,56px);background:#0b0b15;display:none;max-width:800px;margin:0 auto;padding-top:68px}
.editor-topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px clamp(16px,5vw,64px);background:rgba(11,11,21,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04)}
.editor-topbar h2{font-size:clamp(15px,2.2vmin,19px);color:#e8e4f8;font-weight:700;margin:0;letter-spacing:.2px}
.editor-topbar-actions{display:flex;gap:10px}
.e-btn{padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border:none;border-radius:12px;cursor:pointer;font-weight:700;font-family:inherit;min-height:50px;transition:transform .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.e-btn:active{transform:scale(.96)}
.e-btn-start{background:#7c3aed;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.25);padding:8px 24px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-start:hover{background:#8b5cf6;transform:scale(1.02)}
.e-btn-back{background:rgba(255,255,255,.05);color:#7a7e94;border:1px solid rgba(255,255,255,.06);padding:8px 20px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-back:hover{background:rgba(255,255,255,.08)}
.editor-header{text-align:center;padding:clamp(16px,3vmin,28px) 0 clamp(8px,1.5vmin,12px)}
.editor-header p{font-size:clamp(13px,1.6vmin,15px);color:#6a6e84;letter-spacing:.3px}
.editor-section{margin-bottom:clamp(20px,3.5vmin,32px);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:clamp(20px,3vmin,30px)}
.editor-section h3{font-size:clamp(11px,1.3vmin,12px);color:#6e7090;margin-bottom:clamp(14px,2.5vmin,22px);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.asset-wrap{position:relative;width:100%;max-width:200px;margin:0 auto;border-radius:50%;overflow:hidden;aspect-ratio:1}
.asset-preview{width:100%;height:100%;background:#12121e;display:block;border-radius:50%;cursor:grab}
.asset-preview:active{cursor:grabbing}
.zoom-row{display:flex;align-items:center;gap:8px;margin-top:14px;max-width:220px;margin-left:auto;margin-right:auto}
.zoom-pm{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#7a7e94;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;padding:0;line-height:1;flex-shrink:0}
.zoom-pm:hover{background:rgba(255,255,255,.1);color:#c4b5fd;border-color:rgba(124,58,237,.3)}
.zoom-slider{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#7c3aed;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.asset-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;border-radius:50%;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.25) 35%,transparent 55%);pointer-events:none}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-family:inherit;line-height:1;font-weight:600;text-align:center;border:none;background:rgba(255,255,255,.12);color:rgba(255,255,255,.88);padding:6px 16px;margin-bottom:16px;font-size:clamp(11px,1.3vmin,13px);letter-spacing:.3px;transition:all .2s;border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);pointer-events:auto}
.upload-btn:hover{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.25)}
input[type="file"]{display:none}
.field-group{margin-bottom:22px}
.field-group:last-child{margin-bottom:0}
.field-label{display:block;font-size:clamp(12px,1.5vmin,14px);color:#9a9eb4;margin-bottom:10px;font-weight:500;letter-spacing:.2px}
.text-field{width:100%;padding:14px 18px;font-size:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:#d0d4e4;font-family:inherit;min-height:48px;resize:vertical;transition:border-color .2s,box-shadow .2s;line-height:1.5}
.text-field:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);background:rgba(255,255,255,.045)}
.filter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.filter-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:14px;cursor:pointer;font-family:inherit;transition:all .25s;min-height:70px}
.filter-card:hover{background:rgba(255,255,255,.07);transform:translateY(-1px)}
.filter-card.active{border-color:#7c3aed;background:rgba(124,58,237,.12)}
.filter-icon{font-size:24px;line-height:1}
.filter-name{font-size:clamp(11px,1.3vmin,13px);font-weight:600;color:#7a7e94;letter-spacing:.2px}
.filter-card.active .filter-name{color:#c4b5fd}
.diff-group{display:flex;gap:10px}
.diff-btn{flex:1;padding:12px 8px;font-size:clamp(13px,1.5vmin,15px);border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#7a7e94;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;min-height:48px;display:flex;align-items:center;justify-content:center}
.diff-btn:hover{background:rgba(255,255,255,.07)}
.diff-btn.active{border-color:#7c3aed;background:rgba(124,58,237,.1);color:#c4b5fd}
.e-btn-share-full{width:100%;background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.18);padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border-radius:12px;cursor:pointer;font-weight:600;font-family:inherit;min-height:50px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}

.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;color:#e8e4f8;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;border:1px solid rgba(124,58,237,.2);box-shadow:0 4px 20px rgba(0,0,0,.4)}

/* ═══ GAME SCREEN ═══ */
#gameScreen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;width:100%;height:100%;height:100dvh;overflow:hidden}
.back-to-editor{position:fixed;top:8px;left:8px;top:calc(8px + env(safe-area-inset-top,0px));left:calc(8px + env(safe-area-inset-left,0px));z-index:150;padding:8px 14px;font-size:clamp(11px,1.6vmin,14px);border:none;border-radius:8px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);min-height:36px;transition:background .2s;box-shadow:none;letter-spacing:0}
.back-to-editor:hover{background:rgba(0,0,0,.7);color:#fff}

/* ═══ GAME INTERNALS ═══ */
html.mode-game,html.mode-game body{background:#0a0508}
#game-container{position:absolute;top:0;left:0;right:0;bottom:0;background:#0a0508;touch-action:none;overflow:hidden}
#game-container canvas{display:block;position:absolute;top:0;left:0}
#ui-layer{position:absolute;top:0;right:0;left:0;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px));padding-left:calc(14px + env(safe-area-inset-left,0px));padding-right:calc(14px + env(safe-area-inset-right,0px));pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;z-index:20}
.stat-card{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:6px 14px;border-radius:10px;border:1px solid rgba(200,100,60,0.08);display:flex;flex-direction:column;align-items:center;min-width:56px}
.label{font-size:9px;letter-spacing:3px;font-weight:300}
.value{font-size:19px;font-weight:700}
#lives-val{color:#d04040;font-size:16px}
#speedometer{position:absolute;bottom:90px;bottom:calc(90px + env(safe-area-inset-bottom,0px));right:12px;right:calc(12px + env(safe-area-inset-right,0px));width:5px;height:80px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column-reverse;z-index:20}
#speed-bar{width:100%;height:20%;transition:height 0.15s ease;border-radius:2px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;padding:20px;padding-top:calc(20px + env(safe-area-inset-top,0px));padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));transition:opacity 0.6s ease;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
#overlay.hidden{opacity:0;pointer-events:none}
#game-container h1{font-size:clamp(28px,7vmin,40px);font-weight:900;margin:0 0 8px;letter-spacing:3px}
.subtitle{font-size:13px;margin-bottom:44px;font-weight:300;letter-spacing:8px}
.score-summary{font-size:19px;margin:16px 0 36px;font-weight:400;letter-spacing:1px}
.score-summary span{font-weight:300}
#game-container button{border:none;outline:none;padding:16px clamp(40px,10vw,64px);font-size:clamp(16px,3vmin,19px);border-radius:50px;cursor:pointer;font-weight:500;font-family:inherit;transition:transform 0.15s,background 0.25s,box-shadow 0.25s;letter-spacing:3px}
#game-container button:hover{transform:translateY(-2px) scale(1.03)}
#game-container button:active{transform:translateY(1px) scale(0.98);box-shadow:0 3px 15px rgba(0,0,0,0.3)}
#level-up-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);font-size:44px;font-weight:900;opacity:0;pointer-events:none;z-index:50;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1)}
#level-up-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#damage-flash{position:absolute;inset:0;border:4px solid;border-radius:6px;opacity:0;pointer-events:none;z-index:30;transition:opacity 0.08s}
#damage-flash.show{opacity:1}
</style>
</head>

function loadFromHash(){
    const h=location.hash;if(!h||!h.startsWith('#g='))return false;
    try{
        const json=JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
        if(json.d)STATE.difficulty=json.d;
        if(json.f&&['original','pixel','crt','neon'].includes(json.f)){STATE.filter=json.f;}
        const palSet=STATE.filter==='neon'?PALETTES_NEON:PALETTES;
        if(json.p&&palSet[json.p])STATE.palette=json.p;
        else STATE.palette=Object.keys(palSet)[0];
        if(json.t)Object.assign(STATE.texts,json.t);
        if(json.a&&json.a.astronaut)STATE.assets.astronaut=json.a.astronaut;
        if(json.c)Object.assign(STATE.crop,json.c);
        STATE.mode='game';return true;
    }catch(e){return false}
}

function compressImage(dataUrl,maxSize,quality){
    return new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>{
            const c=document.createElement('canvas');
            c.width=maxSize;c.height=maxSize;
            const cx=c.getContext('2d');
            const scale=Math.max(maxSize/img.width,maxSize/img.height);
            const w=img.width*scale,h=img.height*scale;
            cx.drawImage(img,(maxSize-w)/2,(maxSize-h)/2,w,h);
            resolve(c.toDataURL('image/jpeg',quality));
        };
        img.src=dataUrl;
    });
}

async function shareGame(){
    const shareData={d:STATE.difficulty,p:STATE.palette,f:STATE.filter,t:STATE.texts,c:STATE.crop};
    if(STATE.assets.astronaut!==DEFAULT_ASTRO){
        shareData.a={astronaut:await compressImage(STATE.assets.astronaut,80,0.5)};
    }
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));
    const url=window.location.href.split('#')[0]+'#g='+encoded;
    if(navigator.clipboard&&window.isSecureContext){
        navigator.clipboard.writeText(url).then(()=>showToast('הלינק הועתק!')).catch(()=>fallbackCopy(url));
    }else fallbackCopy(url);
}

function fallbackCopy(url){
    const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;top:-9999px;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');showToast('הלינק הועתק!')}catch(e){showToast('לא הצלחנו להעתיק')}
    ta.remove();
}

function showToast(msg){
    let t=document.querySelector('.share-toast');
    if(!t){t=document.createElement('div');t.className='share-toast';document.body.appendChild(t)}
    t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

function handleUpload(e,cb){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>cb(ev.target.result);r.readAsDataURL(f);}

function tintImage(src,tintColor,callback){
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const cx=c.getContext('2d');cx.drawImage(img,0,0);cx.globalCompositeOperation='multiply';cx.fillStyle=tintColor;cx.fillRect(0,0,c.width,c.height);cx.globalCompositeOperation='source-over';callback(c.toDataURL('image/png'));};
    img.src=src;
}
function duotoneImage(src,darkRGB,lightRGB,callback){
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const cx=c.getContext('2d');cx.drawImage(img,0,0);const data=cx.getImageData(0,0,c.width,c.height),d=data.data;for(let i=0;i<d.length;i+=4){const gray=(d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11)/255;d[i]=darkRGB[0]+(lightRGB[0]-darkRGB[0])*gray;d[i+1]=darkRGB[1]+(lightRGB[1]-darkRGB[1])*gray;d[i+2]=darkRGB[2]+(lightRGB[2]-darkRGB[2])*gray;}cx.putImageData(data,0,0);callback(c.toDataURL('image/png'));};
    img.src=src;
}
function processAstronautImage(originalSrc){
    if(!originalSrc)return;

function applyFilterToAstronaut(){
    const src=STATE.assets.astronautOriginal;if(!src)return;
    const pal=getPal();const f=STATE.filter;
    if(f==='original'){STATE.assets.astronaut=src;}
    else if(f==='pixel'){duotoneImage(src,pal.duotoneDark,pal.duotoneLight,url=>{STATE.assets.astronaut=url;});}
    else{tintImage(src,pal.tintColor,url=>{STATE.assets.astronaut=url;});}
}

let _cropImg=null,_cropImgSrc='';
function drawCropPreview(){
    const cv=document.getElementById('astroPreview');if(!cv)return;
    if(_cropImgSrc!==STATE.assets.astronaut){_cropImg=new Image();_cropImg.crossOrigin='anonymous';_cropImg.onload=()=>drawCropPreview();_cropImg.src=STATE.assets.astronaut;_cropImgSrc=STATE.assets.astronaut;}
    const cx=cv.getContext('2d'),sz=cv.width;cx.clearRect(0,0,sz,sz);
    cx.save();cx.beginPath();cx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);cx.clip();
    cx.fillStyle='#12121e';cx.fillRect(0,0,sz,sz);
    if(_cropImg&&_cropImg.complete&&_cropImg.naturalWidth>0){
        const zm=STATE.crop.zoom,iw=_cropImg.naturalWidth,ih=_cropImg.naturalHeight;
        const sc=Math.max(sz/iw,sz/ih)*zm,dw=iw*sc,dh=ih*sc;
        const msx=Math.max(0,(dw-sz)/2),msy=Math.max(0,(dh-sz)/2);
        cx.drawImage(_cropImg,(sz-dw)/2+STATE.crop.ox*msx,(sz-dh)/2+STATE.crop.oy*msy,dw,dh);
    }
    cx.restore();
    cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=2;cx.beginPath();cx.arc(sz/2,sz/2,sz/2-1,0,Math.PI*2);cx.stroke();
}
let _cropDrag=false,_cropSx=0,_cropSy=0,_cropSox=0,_cropSoy=0;
function _cropStartDrag(cx,cy){_cropDrag=true;_cropSx=cx;_cropSy=cy;_cropSox=STATE.crop.ox;_cropSoy=STATE.crop.oy;}
function _cropMoveDrag(cx,cy){
    if(!_cropDrag||!_cropImg||!_cropImg.complete)return;
    const pcv=document.getElementById('astroPreview');if(!pcv)return;
    const rect=pcv.getBoundingClientRect(),dispSz=rect.width,zm=STATE.crop.zoom;
    const iw=_cropImg.naturalWidth,ih=_cropImg.naturalHeight;
    const sc=Math.max(dispSz/iw,dispSz/ih)*zm,dw=iw*sc,dh=ih*sc;
    const msx=Math.max(1,(dw-dispSz)/2),msy=Math.max(1,(dh-dispSz)/2);
    STATE.crop.ox=Math.max(-1,Math.min(1,_cropSox+(cx-_cropSx)/msx));
    STATE.crop.oy=Math.max(-1,Math.min(1,_cropSoy+(cy-_cropSy)/msy));
    drawCropPreview();
}
function _cropEndDrag(){_cropDrag=false;}
window.addEventListener('mousemove',e=>_cropMoveDrag(e.clientX,e.clientY));
window.addEventListener('mouseup',_cropEndDrag);

            if(astroImg.complete&&astroImg.naturalWidth>0){const _winR=36,_winY=-8;ctx.save();ctx.translate(ship.x,ship.y+Math.sin(ship.bobPhase)*2);ctx.rotate(ship.angle);ctx.beginPath();ctx.arc(0,_winY,_winR-2,0,Math.PI*2);ctx.clip();ctx.imageSmoothingEnabled=true;const _is=_winR*2.1,_iw=astroImg.naturalWidth,_ih=astroImg.naturalHeight,_cz=STATE.crop.zoom||1,_sc=Math.max(_is/_iw,_is/_ih)*_cz,_dw=_iw*_sc,_dh=_ih*_sc,_cmx=Math.max(0,(_dw-_is)/2),_cmy=Math.max(0,(_dh-_is)/2);const _glitch=Math.sin(frameCount*0.3)*0.5;ctx.drawImage(astroImg,-_dw/2+(STATE.crop.ox||0)*_cmx+_glitch,_winY-_dh/2+(STATE.crop.oy||0)*_cmy,_dw,_dh);const _hp=pal.hologramRGB;ctx.globalCompositeOperation='source-atop';ctx.fillStyle=`rgba(${_hp[0]},${_hp[1]},${_hp[2]},0.15)`;ctx.beginPath();ctx.arc(0,_winY,_winR-2,0,Math.PI*2);ctx.fill();ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(0,0,0,0.12)';for(let _sy=_winY-_winR;_sy<_winY+_winR;_sy+=3)ctx.fillRect(-_winR,_sy,_winR*2,1);ctx.restore();}
        }else if(filter==='neon'){
            ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,pw,ph);
            ctx.drawImage(offCanvas,0,0);
            try{ctx.globalCompositeOperation='screen';ctx.globalAlpha=0.3;ctx.filter='blur(6px)';ctx.drawImage(offCanvas,0,0);ctx.globalAlpha=0.12;ctx.filter='blur(16px)';ctx.drawImage(offCanvas,0,0);}catch(e){}
            ctx.filter='none';ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
        }else if(filter==='crt'){
            ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,pw,ph);
            let flicker=1.0+(Math.random()-0.5)*0.1;if(Math.random()<0.006)flicker=0.85;
            ctx.globalAlpha=flicker;ctx.drawImage(offCanvas,0,0);ctx.globalAlpha=1;
            const abOff=3*dpr;
            caRctx.setTransform(1,0,0,1,0,0);caRctx.clearRect(0,0,pw,ph);caRctx.drawImage(offCanvas,0,0);caRctx.globalCompositeOperation='multiply';caRctx.fillStyle='#ff0000';caRctx.fillRect(0,0,pw,ph);caRctx.globalCompositeOperation='source-over';
            caCctx.setTransform(1,0,0,1,0,0);caCctx.clearRect(0,0,pw,ph);caCctx.drawImage(offCanvas,0,0);caCctx.globalCompositeOperation='multiply';caCctx.fillStyle='#00ffff';caCctx.fillRect(0,0,pw,ph);caCctx.globalCompositeOperation='source-over';
            ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.2;ctx.drawImage(caR,-abOff,0);ctx.drawImage(caC,abOff,0);
            ctx.globalAlpha=0.08;caCctx.clearRect(0,0,pw,ph);caCctx.drawImage(offCanvas,0,0);caCctx.globalCompositeOperation='multiply';caCctx.fillStyle='#00ff00';caCctx.fillRect(0,0,pw,ph);caCctx.globalCompositeOperation='source-over';ctx.drawImage(caC,0,0);
            ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
            ctx.drawImage(scanlineCanvas,0,0);
            const beamY=((frameCount*1.5)%cH)*dpr;const beam=ctx.createLinearGradient(0,beamY-3*dpr,0,beamY+3*dpr);beam.addColorStop(0,'transparent');beam.addColorStop(0.5,'rgba(255,255,255,0.06)');beam.addColorStop(1,'transparent');ctx.fillStyle=beam;ctx.fillRect(0,beamY-3*dpr,pw,6*dpr);
            const diag=Math.sqrt(pw*pw+ph*ph),vr=diag*0.52;const vig=ctx.createRadialGradient(pw/2,ph/2,vr*0.25,pw/2,ph/2,vr);vig.addColorStop(0,'transparent');vig.addColorStop(0.45,'transparent');vig.addColorStop(0.85,'rgba(0,0,0,0.5)');vig.addColorStop(1,'rgba(0,0,0,0.7)');ctx.fillStyle=vig;ctx.fillRect(0,0,pw,ph);
            ctx.globalCompositeOperation='screen';ctx.globalAlpha=0.04;ctx.fillStyle=`rgb(${pal.crtTint[0]},${pal.crtTint[1]},${pal.crtTint[2]})`;ctx.fillRect(0,0,pw,ph);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
            if(glitchBurst<=0&&Math.random()<0.003)glitchBurst=3+Math.floor(Math.random()*6);
            const _gb=glitchBurst>0;
            if(_gb){ctx.fillStyle=`rgba(${pal.crtTint[0]},${pal.crtTint[1]},${pal.crtTint[2]},0.06)`;ctx.fillRect(0,0,pw,ph);const tearCount=2+Math.floor(Math.random()*2);for(let _t=0;_t<tearCount;_t++){const gy=Math.random()*cH,gh=4+Math.random()*16,gsx=(Math.random()>0.5?1:-1)*(10+Math.random()*30);ctx.drawImage(canvas,0,gy*dpr,pw,gh*dpr,gsx*dpr,gy*dpr,pw,gh*dpr);}const by=Math.random()*ph,bh=(1+Math.random()*4)*dpr;ctx.fillStyle=`rgba(${pal.crtTint[0]},${pal.crtTint[1]},${pal.crtTint[2]},0.3)`;ctx.fillRect(0,by,pw,bh);ctx.globalAlpha=0.18;ctx.drawImage(offCanvas,0,(4+Math.random()*6)*dpr);ctx.globalAlpha=1;const ny=Math.random()*cH,nh=20+Math.random()*40;ctx.globalAlpha=0.35;ctx.drawImage(noiseCanvas,0,0,256,nh,0,ny*dpr,pw,nh*dpr);ctx.globalAlpha=1;glitchBurst--;}
            else{if(Math.random()<0.08){const gy=Math.random()*cH,gh=4+Math.random()*16,gsx=(Math.random()>0.5?1:-1)*(10+Math.random()*30);ctx.drawImage(canvas,0,gy*dpr,pw,gh*dpr,gsx*dpr,gy*dpr,pw,gh*dpr);}if(Math.random()<0.05){const by=Math.random()*ph,bh=(1+Math.random()*4)*dpr;ctx.fillStyle=`rgba(${pal.crtTint[0]},${pal.crtTint[1]},${pal.crtTint[2]},0.3)`;ctx.fillRect(0,by,pw,bh);}if(Math.random()<0.015){ctx.globalAlpha=0.18;ctx.drawImage(offCanvas,0,(4+Math.random()*6)*dpr);ctx.globalAlpha=1;}if(Math.random()<0.03){const ny=Math.random()*cH,nh=20+Math.random()*40;ctx.globalAlpha=0.35;ctx.drawImage(noiseCanvas,0,0,256,nh,0,ny*dpr,pw,nh*dpr);ctx.globalAlpha=1;}}
        }
    }

    function drawDecor(d,_c){const c=_c||ctx;const pal=getPal();c.save();c.translate(d.x,d.y);const sc=d.scale||1;c.scale(sc,sc);if(filter==='neon'){if(d.type==='rock_sm'||d.type==='rock_md'){const sz=d.type==='rock_sm'?9:14;c.fillStyle=pal.decorDark;c.shadowColor=pal.glowSecondary;c.shadowBlur=6;c.beginPath();c.moveTo(-sz*0.9,sz*0.3);c.lineTo(-sz*0.7,-sz*0.5);c.lineTo(0,-sz*0.9);c.lineTo(sz*0.8,-sz*0.5);c.lineTo(sz*1,sz*0.4);c.closePath();c.fill();c.strokeStyle=`rgba(${pal.glowSecondaryRGB},0.3)`;c.lineWidth=1;c.stroke();}else{c.fillStyle=pal.decorDebris;c.shadowColor=pal.glowPrimary;c.shadowBlur=4;c.beginPath();c.moveTo(-7,3);c.lineTo(-5,-3);c.lineTo(0,-7);c.lineTo(7,-3);c.lineTo(9,3);c.closePath();c.fill();c.strokeStyle=`rgba(${pal.glowPrimaryRGB},0.2)`;c.lineWidth=0.8;c.stroke();}c.shadowColor='transparent';c.shadowBlur=0;}else{const shR=d.type.includes('rock')?14:6;c.fillStyle='rgba(0,0,0,0.12)';c.beginPath();c.ellipse(2,3,shR,shR*0.35,0.1,0,Math.PI*2);c.fill();if(d.type==='rock_sm'||d.type==='rock_md'){const sz=d.type==='rock_sm'?9:14;c.fillStyle=pal.decorDark;c.beginPath();c.moveTo(-sz*0.8,sz*0.4);c.lineTo(-sz*0.6,-sz*0.4);c.lineTo(sz*0.1,-sz*0.8);c.lineTo(sz*0.9,-sz*0.4);c.lineTo(sz*1.1,sz*0.5);c.closePath();c.fill();c.fillStyle=pal.decorLight;c.beginPath();c.moveTo(-sz*0.9,sz*0.3);c.lineTo(-sz*0.7,-sz*0.5);c.lineTo(0,-sz*0.9);c.lineTo(sz*0.8,-sz*0.5);c.lineTo(sz*1,sz*0.4);c.closePath();c.fill();}else{c.fillStyle=pal.decorDebris;c.beginPath();c.moveTo(-7,3);c.lineTo(-5,-3);c.lineTo(0,-7);c.lineTo(7,-3);c.lineTo(9,3);c.closePath();c.fill();}}c.restore();}

    function drawItem(it,_c){const c=_c||ctx;const pal=getPal();c.save();c.translate(it.x,it.y);const bob=it.phase!==undefined?Math.sin(it.phase)*2.5:0;if(it.type==='meteor'){if(it.rot)c.rotate(it.rot);if(filter==='neon'){c.shadowColor=pal.glowSecondary;c.shadowBlur=10;c.fillStyle=pal.meteorDarkest;c.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j];j===0?c.moveTo(Math.cos(a)*r,Math.sin(a)*r):c.lineTo(Math.cos(a)*r,Math.sin(a)*r);}c.closePath();c.fill();c.strokeStyle=`rgba(${pal.glowSecondaryRGB},0.5)`;c.lineWidth=1;c.stroke();c.shadowColor='transparent';c.shadowBlur=0;if(it.cracks){c.strokeStyle=`rgba(${pal.glowPrimaryRGB},0.15)`;c.lineWidth=0.5;it.cracks.forEach(cr=>{c.beginPath();c.moveTo(0,0);const ex=Math.cos(cr.a)*it.size*cr.len,ey=Math.sin(cr.a)*it.size*cr.len;c.lineTo(ex,ey);c.stroke();});}}else{c.shadowColor='rgba(0,0,0,0.2)';c.shadowBlur=14;c.shadowOffsetY=4;c.fillStyle='rgba(0,0,0,0.18)';c.beginPath();c.ellipse(4,5,it.size*0.8,it.size*0.38,0.08,0,Math.PI*2);c.fill();c.shadowColor='transparent';c.shadowBlur=0;c.shadowOffsetY=0;c.fillStyle=pal.meteorShadow;c.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j]+1.5;j===0?c.moveTo(Math.cos(a)*r+2,Math.sin(a)*r+2):c.lineTo(Math.cos(a)*r+2,Math.sin(a)*r+2);}c.closePath();c.fill();c.save();c.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j];j===0?c.moveTo(Math.cos(a)*r,Math.sin(a)*r):c.lineTo(Math.cos(a)*r,Math.sin(a)*r);}c.closePath();const mg=c.createRadialGradient(-it.size*0.25,-it.size*0.25,0,0,0,it.size);mg.addColorStop(0,pal.meteorLight);mg.addColorStop(0.4,pal.meteorMid);mg.addColorStop(0.8,pal.meteorDark);mg.addColorStop(1,pal.meteorDarkest);c.fillStyle=mg;c.fill();c.restore();c.fillStyle='rgba(220,180,170,0.08)';c.beginPath();for(let j=0;j<it.pts.length;j++){const a=(j/it.pts.length)*Math.PI*2,r=it.size*it.pts[j]*0.45;j===0?c.moveTo(Math.cos(a)*r-3,Math.sin(a)*r-3):c.lineTo(Math.cos(a)*r-3,Math.sin(a)*r-3);}c.closePath();c.fill();if(it.cracks){c.strokeStyle='rgba(0,0,0,0.14)';c.lineWidth=0.7;it.cracks.forEach(cr=>{c.beginPath();c.moveTo(0,0);const ex=Math.cos(cr.a)*it.size*cr.len,ey=Math.sin(cr.a)*it.size*cr.len;c.quadraticCurveTo(ex*0.3+3,ey*0.3-2,ex,ey);c.stroke();});}}}else if(it.type==='life'){c.shadowColor='rgba(220,40,40,0.35)';c.shadowBlur=22;c.globalAlpha=0.12;c.fillStyle='#d04040';c.beginPath();c.arc(0,bob,30,0,Math.PI*2);c.fill();c.globalAlpha=1;if(!drawEmojiHQ(c,'❤️',0,bob,44)){c.font='44px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('❤️',0,bob);}c.shadowColor='transparent';c.shadowBlur=0;if(filter==='neon'){c.shadowColor=pal.glowPrimary;c.shadowBlur=12;c.strokeStyle=`rgba(${pal.glowPrimaryRGB},0.5)`;c.lineWidth=1.2;c.beginPath();c.arc(0,bob,28,0,Math.PI*2);c.stroke();c.shadowColor='transparent';c.shadowBlur=0;}}else if(it.type==='turbo'){const pulse=Math.sin(frameCount*0.1)*2;c.shadowColor='rgba(240,160,30,0.4)';c.shadowBlur=24;c.globalAlpha=0.14;c.fillStyle='#e09030';c.beginPath();c.arc(0,bob,30+pulse,0,Math.PI*2);c.fill();c.globalAlpha=1;if(!drawEmojiHQ(c,'⚡',0,bob,42)){c.font='42px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('⚡',0,bob);}c.shadowColor='transparent';c.shadowBlur=0;if(filter==='neon'){c.shadowColor=pal.accent;c.shadowBlur=12;c.strokeStyle=`rgba(${pal.accentRGB},0.5)`;c.lineWidth=1.2;c.beginPath();c.arc(0,bob,28,0,Math.PI*2);c.stroke();c.shadowColor='transparent';c.shadowBlur=0;}}else if(it.type==='star'){const pulse=Math.sin(frameCount*0.12)*2;const rot=frameCount*0.02;c.save();c.translate(0,bob);c.rotate(rot);c.shadowColor='rgba(230,190,50,0.45)';c.shadowBlur=26;c.globalAlpha=0.12;c.fillStyle='#e8c040';c.beginPath();c.arc(0,0,28+pulse,0,Math.PI*2);c.fill();c.globalAlpha=1;if(!drawEmojiHQ(c,'⭐',0,2,40)){c.font='40px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('⭐',0,2);}c.shadowColor='transparent';c.shadowBlur=0;if(filter==='neon'){c.strokeStyle=`rgba(${pal.glowSecondaryRGB},0.5)`;c.shadowColor=pal.glowSecondary;c.shadowBlur=12;c.lineWidth=1.2;c.beginPath();c.arc(0,0,28,0,Math.PI*2);c.stroke();c.shadowColor='transparent';c.shadowBlur=0;}c.restore();}c.restore();}

    function drawEnemy(e,_c){const c=_c||ctx;const pal=getPal();c.save();c.translate(e.x,e.y);const bob=Math.sin(frameCount*0.06+(e.x*0.01))*3;const pulse=0.95+Math.sin(frameCount*0.08)*0.05;if(filter==='neon'){c.shadowColor=`rgba(${pal.accentRGB},0.4)`;c.shadowBlur=28;c.shadowOffsetY=0;const glow=c.createRadialGradient(0,bob,8,0,bob,42);glow.addColorStop(0,`rgba(${pal.accentRGB},0.15)`);glow.addColorStop(0.6,`rgba(${pal.accentRGB},0.04)`);glow.addColorStop(1,'transparent');c.fillStyle=glow;c.beginPath();c.arc(0,bob,42,0,Math.PI*2);c.fill();c.shadowColor='transparent';c.shadowBlur=0;c.save();c.translate(0,bob);c.scale(pulse,pulse);if(!drawEmojiHQ(c,e.emoji||'👽',0,4,52)){c.font='52px serif';c.textAlign='center';c.textBaseline='middle';c.fillText(e.emoji||'👽',0,4);}c.shadowColor=pal.accent;c.shadowBlur=12;c.strokeStyle=`rgba(${pal.accentRGB},0.5)`;c.lineWidth=1.2;c.beginPath();c.arc(0,0,30,0,Math.PI*2);c.stroke();c.shadowColor='transparent';c.shadowBlur=0;c.restore();}else{c.shadowColor='rgba(150,30,200,0.35)';c.shadowBlur=28;c.shadowOffsetY=4;c.fillStyle='rgba(120,20,180,0.08)';c.beginPath();c.arc(0,bob,38,0,Math.PI*2);c.fill();c.shadowColor='transparent';c.shadowBlur=0;c.shadowOffsetY=0;const glow=c.createRadialGradient(0,bob,8,0,bob,42);glow.addColorStop(0,'rgba(180,60,255,0.12)');glow.addColorStop(0.6,'rgba(120,20,200,0.04)');glow.addColorStop(1,'transparent');c.fillStyle=glow;c.beginPath();c.arc(0,bob,42,0,Math.PI*2);c.fill();c.save();c.translate(0,bob);c.scale(pulse,pulse);if(!drawEmojiHQ(c,e.emoji||'👽',0,4,52)){c.font='52px serif';c.textAlign='center';c.textBaseline='middle';c.fillText(e.emoji||'👽',0,4);}c.restore();}c.restore();}

    function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
    function nearestPt(y){const idx=Math.round((corridorPts[0].y-y)/5);if(idx>=0&&idx<corridorPts.length)return corridorPts[idx];for(let i=0;i<corridorPts.length;i++){if(Math.abs(corridorPts[i].y-y)<10)return corridorPts[i];}return null;}
    function hit(reason){if(invuln>0||shieldTimer>0)return;lives--;invuln=100;shake=14;playCollision();updateUIFn();damageFlash.classList.add('show');setTimeout(()=>damageFlash.classList.remove('show'),180);if(lives<=0)gameOver(reason);}
    function checkBounds(){const p=nearestPt(ship.y);if(p){if(ship.x<p.x-corridorW/2+35||ship.x>p.x+corridorW/2-35){hit('פגיעה בקיר אנרגיה!');createDust(ship.x,ship.y);ship.x=p.x;}}}
    function updateUIFn(){livesVal.innerText='❤️'.repeat(lives);}
    function gameOver(msg){gameActive=false;const fs=Math.floor(score/10);if(fs>highScore){highScore=fs;localStorage.setItem('spaceHS',highScore.toString());}document.getElementById('title').innerText=msg;const survived=GAME_DURATION-Math.max(gameTime,0);document.getElementById('summary').innerHTML=`מרחק: ${fs} · שרדת: ${survived} שניות<br><span style="font-size:13px;opacity:0.4">שיא: ${highScore}</span>`;startBtn.innerText='שחק שוב';overlay.classList.remove('hidden');timeVal.style.color=getPal().timeColor;}

    const keys={};
    window.onkeydown=e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();};
    window.onkeyup=e=>keys[e.code]=false;
    let touchHoldLeft=0,touchHoldRight=0,touchHoldUp=0,touchHoldDown=0;
    let touchLeft=false,touchRight=false,touchSpeedUp=false,touchSpeedDown=false;
    const TOUCH_PERSIST=8;
    function updateTouches(touches){let rL=false,rR=false,rU=false,rD=false;const rect=canvas.getBoundingClientRect();for(let i=0;i<touches.length;i++){const rx=(touches[i].clientX-rect.left)/rect.width,ry=(touches[i].clientY-rect.top)/rect.height;if(rx<0.42)rL=true;if(rx>0.58)rR=true;if(ry<0.48)rU=true;if(ry>0.52)rD=true;}if(rL)touchHoldLeft=TOUCH_PERSIST;if(rR)touchHoldRight=TOUCH_PERSIST;if(rU)touchHoldUp=TOUCH_PERSIST;if(rD)touchHoldDown=TOUCH_PERSIST;touchLeft=rL||touchHoldLeft>0;touchRight=rR||touchHoldRight>0;touchSpeedUp=rU||touchHoldUp>0;touchSpeedDown=rD||touchHoldDown>0;}
    function tickTouchHold(){if(touchHoldLeft>0)touchHoldLeft--;if(touchHoldRight>0)touchHoldRight--;if(touchHoldUp>0)touchHoldUp--;if(touchHoldDown>0)touchHoldDown--;touchLeft=touchHoldLeft>0;touchRight=touchHoldRight>0;touchSpeedUp=touchHoldUp>0;touchSpeedDown=touchHoldDown>0;}
    canvas.addEventListener('touchstart',e=>{e.preventDefault();initAudio();updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length>0)updateTouches(e.touches);},{passive:false});
    canvas.addEventListener('touchcancel',e=>{e.preventDefault();touchHoldLeft=0;touchHoldRight=0;touchHoldUp=0;touchHoldDown=0;touchLeft=false;touchRight=false;touchSpeedUp=false;touchSpeedDown=false;},{passive:false});

    function handleInput(){let ml=keys['ArrowLeft']||keys['KeyA'],mr=keys['ArrowRight']||keys['KeyD'],mu=keys['ArrowUp']||keys['KeyW'],md=keys['ArrowDown']||keys['KeyS'];if(touchLeft)ml=true;if(touchRight)mr=true;if(touchSpeedUp)mu=true;if(touchSpeedDown)md=true;if(ml){ship.x-=4.5;ship.targetAngle=-0.22;}else if(mr){ship.x+=4.5;ship.targetAngle=0.22;}else ship.targetAngle=0;const spdStep=(touchSpeedUp||touchSpeedDown)?0.12:0.05;if(speedBoostTimer>0)speedBoost=2.5;else if(mu)speedBoost=Math.min(2.5,speedBoost+spdStep);else if(md)speedBoost=Math.max(0.5,speedBoost-spdStep);else speedBoost+=(1-speedBoost)*0.05;ship.x=Math.max(55,Math.min(cW-55,ship.x));}

    function loop(){update();draw();animFrameId=requestAnimationFrame(loop);}

    startBtn.onclick=()=>{
        initAudio();score=0;lives=3;baseSpeed=cfg.spd;corridorW=Math.max(280,Math.min(cW*cfg.widthRatio,520));invuln=0;frameCount=0;speedBoostTimer=0;shieldTimer=0;gameTime=GAME_DURATION;
        initCorridor();updateUIFn();timeVal.innerText=GAME_DURATION;timeVal.style.color=getPal().timeColor;scoreVal.innerText='0';
        overlay.classList.add('hidden');gameActive=true;
        for(let k=0;k<3;k++){const iy=ship.y-200-k*160;const rp=nearestPt(iy);if(!rp)continue;const rx=rp.x;if(k===0)items.push({type:'life',x:rx+(Math.random()-0.5)*(corridorW-60),y:iy,phase:Math.random()*Math.PI*2});else if(k===1)enemies.push({type:'alien',x:rx+(Math.random()-0.5)*(corridorW*0.5),y:iy,vx:(Math.random()-0.5)*1.2,emoji:pickAlienEmoji()});else items.push({type:'meteor',x:rx+(Math.random()-0.5)*(corridorW-50),y:iy,size:28,rot:0,rotSpd:0.01,pts:Array.from({length:8},()=>0.7+Math.random()*0.5),cracks:Array.from({length:3},()=>({a:Math.random()*Math.PI*2,len:0.4}))});}
    };

    window.onresize=resize;
    if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
    generateTextures();resize();loop();
}

loadFromHash();
renderApp();
</script>
